{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-8"><h1 class="h3">{{ titulo }}</h1><div class="alert alert-info">Registrar solamente datos comerciales reales y comprobables. Incluir envio, comisiones y otros costos.</div><form method="post" class="card card-body">{% csrf_token %}{{ form.as_p }}{% if publicaciones %}<label class="form-label">Publicacion asociada</label><select class="form-select mb-3" name="publicacion_id"><option value="">Sin publicacion</option>{% for item in publicaciones %}<option value="{{ item.id }}">{{ item }}</option>{% endfor %}</select>{% endif %}<div><button class="btn btn-primary">Guardar</button> <a class="btn btn-outline-secondary" href="javascript:history.back()">Cancelar</a></div></form></div></div>{% endblock %}
