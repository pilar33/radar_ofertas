{% extends "base.html" %}

{% block title %}Nueva fuente{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Nueva fuente</h1>
<form method="post" class="bg-white border rounded p-3">
  {% csrf_token %}
  <div class="row g-3">
    {% for field in form %}
      <div class="col-md-6">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
      </div>
    {% endfor %}
  </div>
  <button class="btn btn-primary mt-3">Crear y continuar</button>
</form>
{% endblock %}
